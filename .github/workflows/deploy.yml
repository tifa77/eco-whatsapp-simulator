name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main  # يُشغَّل تلقائياً عند كل push على main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    
    steps:
      # 1. سحب الكود
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. تثبيت Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. تثبيت المكتبات
      - name: Install dependencies
        run: npm ci

      # 4. بناء المشروع
      - name: Build project
        run: npm run build

      # 5. إنشاء .htaccess داخل dist
      - name: Create .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [QSA,L]
          EOF

      # 6. رفع محتويات dist على branch hostinger-deploy
      - name: Deploy to hostinger-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: hostinger-deploy
          force_orphan: false
          commit_message: "deploy: auto build from ${{ github.sha }}"
